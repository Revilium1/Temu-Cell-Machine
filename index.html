<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Temu Cell Machine</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="toolbar">
    <button onclick="start()">Play</button>
    <button onclick="stop()">Pause</button>
    <button onclick="step()">Step</button>
    <button onclick="clearGrid()">Clear</button>
    Speed:
    <input type="range" min="1" max="60" value="10" onchange="setSpeed(this.value)">
    Width: <input type="number" id="gridWidth" value="25" min="5" max="50">
Height: <input type="number" id="gridHeight" value="18" min="5" max="50">
<button id="resizeGrid">Resize Grid</button>
    <input type="file" id="loadFile" accept=".json" style="display:none" />
    <button onclick="saveToFile()">Save</button>
    <button onclick="document.getElementById('loadFile').click()">Load</button>
</div>

<canvas id="grid"></canvas>

<div id="palette"></div>

<script src="script.js"></script>
</body>
</html>
